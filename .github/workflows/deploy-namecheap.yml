name: Deploy to cPanel Shared Hosting

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.CPANEL_SSH_PRIVATE_KEY }}

      - name: Add hosting server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p "${{ secrets.CPANEL_SSH_PORT }}" -H "${{ secrets.CPANEL_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy latest GitHub commit
        env:
          SSH_HOST: ${{ secrets.CPANEL_SSH_HOST }}
          SSH_PORT: ${{ secrets.CPANEL_SSH_PORT }}
          SSH_USER: ${{ secrets.CPANEL_SSH_USER }}
          APP_ROOT: ${{ secrets.CPANEL_APP_ROOT }}
          REPO_URL: ${{ secrets.CPANEL_REPO_URL }}
          DEPLOY_BRANCH: main
        run: |
          ssh -p "${SSH_PORT}" "${SSH_USER}@${SSH_HOST}" \
            "export APP_ROOT='${APP_ROOT}' DEPLOY_BRANCH='${DEPLOY_BRANCH}' REPO_URL='${REPO_URL}'; bash -s" \
            < scripts/deploy-from-github.sh
